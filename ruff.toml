# Lint configuration. Kept deliberately small: rules that catch real mistakes,
# without fighting the generator's intentional design choices.
line-length = 88

[lint]
select = ["E", "F", "W", "I", "UP", "B"]

[lint.per-file-ignores]
# Tests must adjust sys.path before importing the generator.
"tests/*" = ["E402"]
# Databricks notebooks: spark/display/dbutils are injected by the runtime,
# and notebook cells import where they are used.
"src/*" = ["F821", "E402"]
